<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e0f17">
<title>Моя коллекция фильмов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── Дизайн-система (унаследована от Zahar Dashboard) ───────────── */
:root{
  --bg:#0e0f17; --bg-soft:#161826; --card:#171a2b; --card-2:#1d2032;
  --text:#eef0fb; --text-soft:#b9bedb; --text-muted:#7e85a8;
  --border:#262a40; --border-soft:#1e2236;
  --shadow:0 1px 3px rgba(0,0,0,.4); --shadow-lg:0 18px 40px rgba(0,0,0,.55);
  --radius:16px; --radius-sm:11px; --radius-pill:999px;
  --accent:#a78bfa; --accent-soft:#2a2350;
  --gold:#ffcb6b; --rose:#ff7eb6; --green:#7ee0a0; --blue:#7ec5ff;
  --g-comedy:#ffb454; --g-drama:#ff7eb6; --g-melo:#ff7eb6;
  --g-action:#ff6b6b; --g-scifi:#7ec5ff; --g-thriller:#a78bfa; --g-other:#7ee0a0;
}
[data-theme="light"]{
  --bg:#faf9fc; --bg-soft:#f1f0f7; --card:#ffffff; --card-2:#f6f5fb;
  --text:#171a2b; --text-soft:#454a66; --text-muted:#8b90ab;
  --border:#e6e4f0; --border-soft:#efedf6;
  --shadow:0 1px 3px rgba(20,20,40,.06); --shadow-lg:0 18px 40px rgba(40,30,80,.12);
  --accent-soft:#ece6ff;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Comfortaa',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(1100px 540px at 85% -8%,#1e3a8a40 0,transparent 60%),
    radial-gradient(900px 480px at -8% 6%,#1d4ed833 0,transparent 55%),
    var(--bg);
  color:var(--text); font-size:16px; line-height:1.6; min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
input,button,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

/* ─── Layout ─────────────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:288px 1fr;
     grid-template-areas:"header header" "side main";min-height:100vh}
header.top{grid-area:header;display:flex;align-items:center;gap:14px;
  padding:14px 26px;background:color-mix(in srgb,var(--card) 80%,transparent);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:18px}
.brand .dot{width:11px;height:11px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--rose));
  box-shadow:0 0 14px var(--rose)}
.brand .meta{font-weight:400;font-size:12.5px;color:var(--text-muted)}
.top .spacer{flex:1}
.top input[type="search"]{flex:0 1 280px;border:1px solid var(--border);
  background:var(--bg);border-radius:var(--radius-pill);padding:9px 16px;
  color:var(--text);font-size:14px;outline:none;transition:.2s}
.top input[type="search"]:focus{border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft)}
.icon-btn{width:38px;height:38px;border:1px solid var(--border);background:var(--bg);
  border-radius:var(--radius-pill);color:var(--text-soft);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;font-size:17px;transition:.15s}
.icon-btn:hover{background:var(--bg-soft);color:var(--text)}
.add-btn{display:inline-flex;align-items:center;gap:7px;border:none;cursor:pointer;
  padding:10px 18px;border-radius:var(--radius-pill);font-size:14px;font-weight:700;
  background:linear-gradient(135deg,#ff4f7e,#ff2d55);color:#fff;
  box-shadow:0 10px 22px -10px #ff2d55;transition:.16s}
.add-btn:hover{transform:translateY(-1px)}

/* ─── Sidebar ────────────────────────────────────────────────────── */
aside.side{grid-area:side;background:color-mix(in srgb,var(--card) 70%,transparent);
  border-right:1px solid var(--border);padding:18px 14px 80px;overflow-y:auto;
  height:calc(100vh - 67px);position:sticky;top:67px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.09em;color:var(--text-muted);padding:14px 12px 7px}
.nav{display:flex;flex-direction:column;gap:4px;margin-bottom:6px}
.nav .item{display:flex;align-items:center;gap:11px;padding:10px 13px;
  border-radius:var(--radius-sm);cursor:pointer;border:1px solid transparent;
  user-select:none;transition:.15s;font-size:14px;font-weight:600;color:var(--text-soft)}
.nav .item:hover{background:var(--bg-soft);color:var(--text)}
.nav .item.active{background:var(--accent-soft);border-color:var(--accent);color:var(--text)}
.nav .item .swatch{width:13px;height:13px;border-radius:4px;flex:0 0 auto}
.nav .item .ic{width:18px;text-align:center;font-size:15px}
.nav .item .name{flex:1}
.nav .item .count{font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums}

.stat-box{margin:14px 12px;padding:15px;border-radius:var(--radius-sm);background:var(--bg-soft)}
.stat-box .bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin:9px 0 8px}
.stat-box .fill{height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--green),var(--blue));transition:width .4s}
.stat-box .row{display:flex;justify-content:space-between;font-size:12.5px;color:var(--text-muted)}
.stat-box .row b{color:var(--text);font-variant-numeric:tabular-nums}

.yearbox{display:flex;align-items:center;gap:7px;margin:4px 12px 9px}
.yearbox input{width:100%;border:1px solid var(--border);background:var(--bg);color:var(--text);
  border-radius:9px;padding:8px 8px;font-size:13px;outline:none;text-align:center;
  font-variant-numeric:tabular-nums}
.yearbox input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.yearbox span{color:var(--text-muted)}
.yearbox .icon-btn{width:32px;height:32px;font-size:13px;flex:0 0 auto}
.year-quick{display:flex;flex-wrap:wrap;gap:6px;margin:0 12px 6px}
.year-quick button{border:1px solid var(--border);background:var(--bg);color:var(--text-muted);
  font-size:12px;font-weight:600;padding:6px 11px;border-radius:var(--radius-pill);cursor:pointer}
.year-quick button:hover{color:var(--text)}
.year-quick button.on{background:var(--accent-soft);border-color:var(--accent);color:var(--text)}

/* ─── Main ───────────────────────────────────────────────────────── */
main{grid-area:main;padding:28px 36px 100px;width:100%;max-width:1280px;margin:0 auto}
.page-head{display:flex;align-items:flex-end;gap:14px;margin:6px 0 22px}
.page-head h1{font-size:clamp(24px,3.4vw,34px);font-weight:700;margin:0;letter-spacing:-.01em}
.page-head .sub{color:var(--text-muted);font-size:13.5px;margin-left:auto}

.grid{display:grid;gap:24px 20px;grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
.poster-card{cursor:pointer;display:flex;flex-direction:column;gap:11px;
  background:linear-gradient(180deg,var(--card),var(--bg-soft));
  border:1px solid var(--border);border-radius:20px;padding:11px;
  transition:transform .22s cubic-bezier(.2,.7,.2,1),border-color .22s,box-shadow .22s}
.poster-card:hover{transform:translateY(-8px);border-color:#3b82f6aa;
  box-shadow:0 22px 46px -18px #3b82f6cc,0 0 0 1px #3b82f655,
             inset 0 0 0 1px #ffffff14}
.poster-wrap{position:relative;aspect-ratio:2/3;border-radius:14px;overflow:hidden;
  background:var(--card-2);box-shadow:0 10px 26px -14px #000a;border:1px solid var(--border)}
.poster-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.poster-card:hover .poster-wrap img{transform:scale(1.07)}
/* вспышка-блик при наведении */
.poster-wrap::after{content:"";position:absolute;inset:0;z-index:4;pointer-events:none;
  background:linear-gradient(115deg,transparent 32%,#ffffff66 48%,#cfe4ff55 52%,transparent 68%);
  transform:translateX(-130%) skewX(-12deg);opacity:0}
.poster-card:hover .poster-wrap::after{animation:sheen .75s ease}
@keyframes sheen{0%{transform:translateX(-130%) skewX(-12deg);opacity:1}
  100%{transform:translateX(130%) skewX(-12deg);opacity:1}}
.poster-wrap .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:40px;opacity:.5}
.poster-wrap .grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,#000a 100%)}
.tier-badge{position:absolute;top:9px;left:9px;font-size:10px;font-weight:700;
  padding:4px 9px;border-radius:var(--radius-pill);color:#1a1205;
  text-transform:uppercase;letter-spacing:.5px;z-index:2}
.seen-flag{position:absolute;top:9px;right:9px;width:25px;height:25px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:13px;z-index:2;
  background:#0009;backdrop-filter:blur(3px)}
.poster-wrap .yr{position:absolute;left:10px;bottom:9px;font-size:12px;font-weight:600;
  color:#fff;text-shadow:0 1px 6px #000;z-index:2}
.poster-meta{padding:0 3px 3px}
.poster-meta .title{font-size:16px;font-weight:700;line-height:1.3;color:var(--text)}
.poster-meta .gtags{font-size:12.5px;color:var(--text-soft);margin-top:4px}
.poster-meta .st{font-size:12.5px;font-weight:700;margin-top:6px;display:inline-block}
.st.seen{color:var(--green)} .st.want{color:var(--gold)}
.empty{grid-column:1/-1;text-align:center;color:var(--text-muted);padding:70px 0;font-size:15px}

/* ─── Overlay (общий) ────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;z-index:100;display:none;
  background:#070810cc;backdrop-filter:blur(8px);
  align-items:flex-start;justify-content:center;padding:40px 18px;overflow-y:auto}
.overlay.open{display:flex}
.close{position:absolute;top:18px;right:18px;z-index:5;width:46px;height:46px;border-radius:50%;
  border:none;background:#00000099;color:#fff;font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:.16s}
.close:hover{background:#000;transform:rotate(90deg)}
.close:hover{background:#000000bb}

/* ─── Detail ─────────────────────────────────────────────────────── */
.detail{position:relative;width:min(1080px,100%);border-radius:26px;overflow:hidden;
  background:var(--card);border:1px solid #3b82f655;
  box-shadow:0 30px 80px -20px #000,0 0 0 1px #3b82f633,0 0 60px -20px #3b82f6aa;
  animation:pop .28s cubic-bezier(.2,.7,.2,1)}
@keyframes pop{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1}}
.detail .hero{position:relative;display:flex;gap:34px;padding:32px 38px;align-items:center}
.detail .hero .bd{position:absolute;inset:0;background-size:cover;background-position:center top;
  filter:blur(26px) brightness(.4) saturate(1.2);transform:scale(1.15);z-index:0}
.detail .hero .bd::after{content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,#0008,var(--card) 96%)}
.detail .hero .poster{position:relative;z-index:1;flex:0 0 250px;aspect-ratio:2/3;
  border-radius:16px;overflow:hidden;box-shadow:0 24px 50px -16px #000d;border:1px solid #ffffff2e;
  background:linear-gradient(135deg,#1e3a8a,#23203a)}
.detail .hero .poster img{width:100%;height:100%;object-fit:cover;display:block}
.detail .hero .info{position:relative;z-index:1;flex:1;color:#fff}
.detail .hero .crumbs{font-size:14px;color:#ffffffd0;margin-bottom:13px;letter-spacing:.02em;font-weight:600}
.detail .hero h2{font-size:clamp(32px,4.6vw,52px);font-weight:800;margin:0 0 16px;
  line-height:1.05;letter-spacing:-.01em;text-shadow:0 2px 22px #000b}
.detail .hero .metarow{display:flex;flex-wrap:wrap;align-items:center;gap:12px;
  font-size:16px;font-weight:600;color:#fff;margin-bottom:16px}
.detail .hero .score{font-weight:700;font-size:18px;color:var(--gold)}
.detail .hero .dot-sep{width:5px;height:5px;border-radius:50%;background:#fff8}
.detail .hero .pills{display:flex;flex-wrap:wrap;gap:9px}
.pill{font-size:13.5px;font-weight:600;padding:7px 15px;border-radius:var(--radius-pill);
  background:#ffffff22;color:#fff;border:1px solid #ffffff33;backdrop-filter:blur(4px)}
.detail .body{padding:28px 38px 36px;background:var(--card)}
.detail .desc{font-size:17px;line-height:1.8;color:var(--text);margin:0 0 26px;max-width:780px}
.detail .controls{display:flex;flex-wrap:wrap;gap:11px;align-items:center}

.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;
  border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--card-2);
  color:var(--text);font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;transition:.16s}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,#ff4f7e,#ff2d55);color:#fff;border:none;
  box-shadow:0 10px 24px -8px #ff2d55}
.btn.go{background:linear-gradient(135deg,var(--green),#4fb87a);color:#06210f;border:none}
.btn.ghost{background:transparent}
.btn.danger{color:#ff8a8a;border-color:#ff8a8a55}
.btn.danger:hover{background:#ff5a5a1a;border-color:#ff8a8a}
.btn.sm{padding:9px 14px;font-size:13px}
.detail .controls .btn{padding:14px 26px;font-size:15px}
.detail .controls .btn.sm{padding:12px 18px;font-size:14px}
.detail .controls .tsel{gap:8px;margin-top:6px}
.detail .controls .tsel button{padding:11px 16px;font-size:13.5px}
.tsel{display:flex;flex-wrap:wrap;gap:6px;width:100%;margin-top:4px}
.tsel button{font-size:12px;font-weight:700;padding:9px 13px;border-radius:var(--radius-pill);
  border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer}
.tsel button.on{color:#1a1205}
.rate-hint{font-size:12.5px;color:var(--text-muted);line-height:1.5;flex-basis:100%;
  display:flex;align-items:center;gap:6px}

/* ─── Форма добавления ───────────────────────────────────────────── */
.formbox{position:relative;width:min(620px,100%);border-radius:22px;
  background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow-lg);
  padding:28px 30px 30px;animation:pop .25s ease}
.formbox h2{margin:0 0 4px;font-size:23px;font-weight:700}
.formbox .hint{color:var(--text-muted);font-size:13px;margin:0 0 20px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--text-soft);
  margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--border);
  background:var(--bg);color:var(--text);border-radius:11px;padding:11px 13px;
  font-size:14px;outline:none;transition:.18s}
.field textarea{resize:vertical;min-height:84px;line-height:1.55}
.field input:focus,.field textarea:focus,.field select:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field-row{display:flex;gap:12px}.field-row>*{flex:1}
.fetch-row{display:flex;gap:10px;align-items:flex-end}
.fetch-row .field{flex:1;margin-bottom:0}
.fetch-status{font-size:12.5px;margin:7px 2px 12px;min-height:16px;line-height:1.4}
.fetch-status.err{color:#ff8a8a}.fetch-status.ok{color:var(--green)}.fetch-status.load{color:var(--blue)}
.preview-poster{width:84px;aspect-ratio:2/3;border-radius:9px;object-fit:cover;
  border:1px solid var(--border);background:var(--card-2);display:none}
.preview-poster.show{display:block}
.seg{display:flex;gap:6px;flex-wrap:wrap}
.seg button{border:1px solid var(--border);background:var(--bg);color:var(--text-muted);
  padding:9px 14px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;cursor:pointer}
.seg button.on{background:var(--accent-soft);border-color:var(--accent);color:var(--text)}
.form-actions{display:flex;gap:10px;margin-top:22px}
.form-actions .btn{flex:1;justify-content:center}

/* ─── Бренд-вордмарк ─────────────────────────────────────────────── */
.brand{gap:12px}
.logo-mark{width:38px;height:38px;border-radius:11px;flex:0 0 auto;display:flex;
  align-items:center;justify-content:center;color:#fff;
  background:linear-gradient(135deg,#3b82f6,#60a5fa,#a78bfa,#3b82f6);
  background-size:220% 220%;
  box-shadow:0 8px 22px -8px #3b82f6;
  animation:logoFloat 5s ease-in-out infinite, logoHue 7s linear infinite}
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(0)}
  50%{transform:translateY(-3px) rotate(-4deg)}}
@keyframes logoHue{0%{background-position:0% 50%}100%{background-position:220% 50%}}
.logo-mark svg{width:21px;height:21px;animation:logoGlow 3.2s ease-in-out infinite}
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 0 #fff0)}50%{filter:drop-shadow(0 0 4px #fffc)}}
.logo-text{display:flex;flex-direction:column;line-height:1.05;font-weight:700;font-size:20px;
  letter-spacing:.16em;
  background:linear-gradient(90deg,var(--gold),var(--rose),var(--accent),var(--blue),var(--gold));
  background-size:220% 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:logoText 8s linear infinite}
@keyframes logoText{0%{background-position:0 0}100%{background-position:220% 0}}

/* летающие еле заметные синие шарики */
.particles{position:absolute;inset:0}
.particle{position:absolute;bottom:-40px;border-radius:50%;
  background:radial-gradient(circle at 32% 30%,#cfe4ff,#3b82f6 70%);
  filter:blur(.6px);opacity:0;will-change:transform,opacity;
  animation:floaty linear infinite}
@keyframes floaty{
  0%{transform:translateY(0) translateX(0) scale(.6);opacity:0}
  12%{opacity:var(--o)}
  88%{opacity:var(--o)}
  100%{transform:translateY(-108vh) translateX(var(--dx)) scale(1.05);opacity:0}}
.logo-text .meta{font-weight:500;font-size:11px;letter-spacing:.12em;
  -webkit-text-fill-color:var(--text-muted);color:var(--text-muted);margin-top:3px}

/* ─── Sidebar accordion ──────────────────────────────────────────── */
.acc{border-bottom:1px solid var(--border-soft)}
.acc-head{width:100%;display:flex;align-items:center;justify-content:space-between;
  background:none;border:none;cursor:pointer;color:var(--text-muted);
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;
  padding:14px 12px 11px;transition:color .15s}
.acc-head:hover{color:var(--text-soft)}
.acc-head .chev{transition:transform .3s cubic-bezier(.4,0,.2,1)}
.acc-body{display:grid;grid-template-rows:1fr;
  transition:grid-template-rows .32s cubic-bezier(.4,0,.2,1),opacity .26s}
.acc-body>div{overflow:hidden;min-height:0}
.acc.collapsed .acc-body{grid-template-rows:0fr;opacity:0}
.acc.collapsed .acc-head .chev{transform:rotate(-90deg)}
.acc-body .nav,.acc-body .yearbox{margin-top:0}
.acc-body{padding-bottom:6px}

/* ─── Motion (framer-style) ──────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.poster-card{animation:fadeUp .44s cubic-bezier(.2,.7,.2,1) both}
.poster-card:active{transform:scale(.97)}
.btn:active,.add-btn:active,.icon-btn:active,.seg button:active,.tsel button:active,
.nav .item:active,.year-quick button:active{transform:scale(.96)}
.nav .item{transition:background .15s,border-color .15s,transform .12s}
.tier-badge{transition:transform .2s}
.poster-card:hover .tier-badge{transform:translateY(-2px)}
.brand .dot{animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--rose)}50%{box-shadow:0 0 14px 2px var(--rose)}}

/* ─── Анимированный сине-белый фон + вотермарк «КИНОТЕКА» ────────── */
.bg-fx{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.app{position:relative;z-index:1}
.bg-grad{position:absolute;inset:-25%;filter:blur(50px);
  background:
    radial-gradient(38% 38% at 20% 30%,#2563eb66 0,transparent 70%),
    radial-gradient(42% 42% at 80% 20%,#60a5fa55 0,transparent 70%),
    radial-gradient(46% 46% at 62% 78%,#ffffff26 0,transparent 70%),
    radial-gradient(40% 40% at 14% 84%,#3b82f655 0,transparent 70%);
  animation:bgflow 20s ease-in-out infinite alternate}
@keyframes bgflow{
  0%{transform:translate(0,0) scale(1)}
  50%{transform:translate(4%,-3%) scale(1.12)}
  100%{transform:translate(-4%,3%) scale(1.06)}}
.bg-word{position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-8deg);white-space:nowrap;
  font-weight:800;font-size:23vw;letter-spacing:.04em;opacity:.10;

function visible(){
  const q=f.q.trim().toLowerCase();
  return MOVIES.filter(m=>
    (f.status==="all"||m.status===f.status)&&
    (f.tier==="all"||(f.tier==="waiting"?m.status==="want":(m.status==="seen"&&m.tier===f.tier)))&&
    (f.genre==="all"||m.genres.includes(f.genre))&&
    (f.yearFrom==null||(+m.year)>=f.yearFrom)&&
    (f.yearTo==null||(+m.year)<=f.yearTo)&&
    (!q||m.title.toLowerCase().includes(q)||(m.orig||"").toLowerCase().includes(q)));
}
function render(){
  renderNav();

  else if(f.status==="want")t="Хочу посмотреть"; else if(f.tier==="waiting")t="В ожидании";
  else if(f.tier!=="all")t=TIERS[f.tier].label;

  if(f.yearFrom!=null||f.yearTo!=null)sub+=" · "+(f.yearFrom??"…")+"–"+(f.yearTo??"…");

}
function plural(n,a,b,c){n=Math.abs(n)%100;const n1=n%10;
  if(n>10&&n<20)return c;if(n1>1&&n1<5)return b;if(n1===1)return a;return c}
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* Подтяжка с Википедии (CORS open, origin=*) */
async function fetchMeta(){
  const title=document.getElementById("fTitle").value.trim();
  const year=document.getElementById("fYear").value.trim();
  const st=document.getElementById("fetchStatus");
  if(!title){st.className="fetch-status err";st.textContent="Сначала впиши название.";return;}
  st.className="fetch-status load";st.textContent="Ищу в Википедии…";
  const search=encodeURIComponent(title+(year?(" "+year):"")+" фильм");
  const url=`https://ru.wikipedia.org/w/api.php?action=query&format=json&origin=*`+
    `&generator=search&gsrsearch=${search}&gsrlimit=1`+
    `&prop=extracts|pageimages&exintro=1&explaintext=1&piprop=original|thumbnail&pithumbsize=600`;
  try{
    const r=await fetch(url);const j=await r.json();
    const pages=j?.query?.pages;
    if(!pages){st.className="fetch-status err";st.textContent="Ничего не нашлось. Заполни вручную.";return;}
    const p=Object.values(pages)[0];
    let poster=p.original?.source||p.thumbnail?.source||"";
    let desc=(p.extract||"").trim();
    if(desc.length>500)desc=desc.slice(0,500).replace(/\s+\S*$/,"")+"…";
    // iTunes — запасной постер + продолжительность + жанр (Вики прячет несвободные афиши)
    const it=await itunes(title,year);
    if(!poster&&it.poster)poster=it.poster;
    let genres=genresFromText(desc);
    if(!genres.length&&it.genre)genres=[it.genre];
    if(poster){document.getElementById("fPoster").value=poster;
      const pv=document.getElementById("fPreview");pv.src=poster;pv.classList.add("show");}
    if(desc)document.getElementById("fDesc").value=desc;
    const gEl=document.getElementById("fGenres");if(genres.length&&!gEl.value.trim())gEl.value=genres.join(", ");
    const rEl=document.getElementById("fRuntime");if(it.runtime&&!rEl.value.trim())rEl.value=it.runtime;
    st.className="fetch-status ok";
    st.textContent="Готово: "+(p.title||title)+(poster?"":" — постер не нашёлся, вставь ссылку сам");
  }catch(e){
    // Вики не ответила — пробуем хотя бы данные из iTunes
    const it=await itunes(title,year);
    if(it.poster){document.getElementById("fPoster").value=it.poster;
      const pv=document.getElementById("fPreview");pv.src=it.poster;pv.classList.add("show");
      const gEl=document.getElementById("fGenres");if(it.genre&&!gEl.value.trim())gEl.value=it.genre;
      const rEl=document.getElementById("fRuntime");if(it.runtime&&!rEl.value.trim())rEl.value=it.runtime;
      st.className="fetch-status ok";st.textContent="Нашёл постер в iTunes. Описание впиши вручную.";}
    else{st.className="fetch-status err";st.textContent="Не удалось загрузить. Заполни вручную.";}
  }
}
// iTunes Search API (CORS open): постер, жанр, продолжительность
async function itunes(title,year){
  const GMAP={Comedy:"Комедия",Drama:"Драма",Romance:"Мелодрама",Action:"Боевик",
    "Sci-Fi & Fantasy":"Фантастика","Action & Adventure":"Боевик",Adventure:"Приключения",
    Thriller:"Триллер",Horror:"Ужасы",Crime:"Криминал",Mystery:"Детектив",
    Animation:"Мультфильм",Documentary:"Документальный",Kids:"Семейный","Kids & Family":"Семейный",
    Western:"Вестерн",Musical:"Мюзикл",War:"Военный",History:"Исторический"};
  try{
    const q=encodeURIComponent(title+(year?(" "+year):""));
    const r=await fetch(`https://itunes.apple.com/search?media=movie&entity=movie&limit=1&term=${q}`);
    const j=await r.json();const res=j?.results?.[0];if(!res)return {};
    const art=res.artworkUrl100?res.artworkUrl100.replace(/\/\d+x\d+bb/,"/600x600bb"):"";
    const g=res.primaryGenreName?(GMAP[res.primaryGenreName]||res.primaryGenreName):"";
    let rt="";if(res.trackTimeMillis){const min=Math.round(res.trackTimeMillis/60000);
      const h=Math.floor(min/60),m=min%60;rt=(h?h+" ч ":"")+(m?m+" мин":"").trim();}
    return {poster:art,genre:g,runtime:rt};
  }catch(e){return {}}
}
// вытащить жанры из русского описания Википедии (по ключевым словам)
function genresFromText(text){
  const t=(text||"").toLowerCase();
  const map=[["комедий","Комедия"],["мелодрам","Мелодрама"],["романтич","Мелодрама"],
    ["драматическ","Драма"],["боевик","Боевик"],["фантастик","Фантастика"],["фэнтези","Фэнтези"],
    ["триллер","Триллер"],["ужас","Ужасы"],["приключен","Приключения"],["детектив","Детектив"],
    ["криминал","Криминал"],["гангстер","Криминал"],["мультфильм","Мультфильм"],["анимацион","Мультфильм"],
    ["мюзикл","Мюзикл"],["военн","Военный"],["историческ","Исторический"],["биографич","Биография"],
    ["вестерн","Вестерн"],["документальн","Документальный"]];
  const out=[];for(const [k,v] of map){if(t.includes(k)&&!out.includes(v))out.push(v);}
  return out.slice(0,3);
}

function saveForm(){
  const title=document.getElementById("fTitle").value.trim();
  if(!title){const st=document.getElementById("fetchStatus");st.className="fetch-status err";st.textContent="Название обязательно.";return;}
  const year=document.getElementById("fYear").value.trim();
  const genres=document.getElementById("fGenres").value.split(",").map(s=>s.trim()).filter(Boolean);
  const where=document.getElementById("fWhere").value.trim()||
    ("https://www.kinopoisk.ru/index.php?kp_query="+encodeURIComponent(title+(year?" "+year:"")));
  const data={
    title,year,orig:formDraft.orig||"",
    country:formDraft.country||"",runtime:document.getElementById("fRuntime").value.trim(),
    poster:document.getElementById("fPoster").value.trim(),
    desc:document.getElementById("fDesc").value.trim(),
    genres:genres.length?genres:["Без жанра"],
    tier:document.getElementById("fTier").value,
    status:formDraft.status||"want",
    where
  };
  if(editId){const m=MOVIES.find(x=>x.id===editId);Object.assign(m,data);}
  else{data.id="m"+Date.now().toString(36);MOVIES.unshift(data);}
  persist();render();closeForm();
  if(editId)openDetail(editId);
}

/* ===== События ===== */
document.addEventListener("click",e=>{
  const nav=e.target.closest(".item");
  if(nav){const k=nav.dataset.kind,v=nav.dataset.val;f[k]=v;render();return;}
  const card=e.target.closest(".poster-card");
  if(card){openDetail(card.dataset.id);return;}
  const act=e.target.closest("[data-act]");
  if(act){
    const a=act.dataset.act;
    if(a==="close")return closeDetail();
    const m=MOVIES.find(x=>x.id===act.dataset.id);
    if(a==="toggle"){m.status=m.status==="want"?"seen":"want";persist();render();openDetail(m.id);}
    if(a==="tier"){m.tier=act.dataset.tier;persist();render();openDetail(m.id);}
    if(a==="edit"){closeDetail();openForm(m.id);}
    if(a==="del"){if(confirm(`Удалить «${m.title}» из коллекции?`)){
      MOVIES=MOVIES.filter(x=>x.id!==m.id);persist();render();closeDetail();}}
    return;
  }
  const fact=e.target.closest("[data-fact]");
  if(fact){
    const a=fact.dataset.fact;
    if(a==="close")return closeForm();
    if(a==="fetch")return fetchMeta();
    if(a==="save")return saveForm();
  }
});
document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeDetail()});
document.getElementById("formOverlay").addEventListener("click",e=>{if(e.target.id==="formOverlay")closeForm()});
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeDetail();closeForm();}});
document.getElementById("search").addEventListener("input",e=>{f.q=e.target.value;render()});
document.getElementById("addBtn").addEventListener("click",()=>openForm(null));

/* ===== Летающие синие шарики ===== */
(function makeParticles(){
  const box=document.getElementById("particles");if(!box)return;
  const N=22;let html="";
  for(let i=0;i<N;i++){
    const size=(6+Math.random()*18).toFixed(0);
    const left=(Math.random()*100).toFixed(1);
    const dur=(16+Math.random()*20).toFixed(1);
    const delay=(-Math.random()*dur).toFixed(1);
    const dx=((Math.random()*2-1)*120).toFixed(0);
    const o=(0.05+Math.random()*0.13).toFixed(2);
    html+=`<span class="particle" style="width:${size}px;height:${size}px;left:${left}%;`+
      `animation-duration:${dur}s;animation-delay:${delay}s;--dx:${dx}px;--o:${o}"></span>`;
  }
  box.innerHTML=html;
})();

/* ===== Раскрывающиеся секции (accordion) ===== */
const ACC_KEY="movieAcc_v1";
let accState={};try{accState=JSON.parse(localStorage.getItem(ACC_KEY))||{}}catch(e){}
document.querySelectorAll(".acc").forEach(a=>{
  const id=a.dataset.acc;
  if(accState[id]===false)a.classList.add("collapsed");
  a.querySelector(".acc-head").addEventListener("click",()=>{
    const collapsed=a.classList.toggle("collapsed");
    accState[id]=!collapsed;localStorage.setItem(ACC_KEY,JSON.stringify(accState));});
});

/* ===== Фильтр по году ===== */
const yf=document.getElementById("yearFrom"),yt=document.getElementById("yearTo");
function syncQuick(){document.querySelectorAll("#yearQuick button").forEach(b=>{
  const d=+b.dataset.dec;b.classList.toggle("on",f.yearFrom===d&&f.yearTo===d+9);});}
function applyYear(){f.yearFrom=yf.value?+yf.value:null;f.yearTo=yt.value?+yt.value:null;syncQuick();render();}
yf.addEventListener("input",applyYear);yt.addEventListener("input",applyYear);
document.getElementById("yearReset").addEventListener("click",()=>{
  yf.value="";yt.value="";f.yearFrom=null;f.yearTo=null;syncQuick();render();});
document.getElementById("yearQuick").addEventListener("click",e=>{
  const b=e.target.closest("button[data-dec]");if(!b)return;
  const d=+b.dataset.dec;
  if(f.yearFrom===d&&f.yearTo===d+9){f.yearFrom=null;f.yearTo=null;yf.value="";yt.value="";}
  else{f.yearFrom=d;f.yearTo=d+9;yf.value=d;yt.value=d+9;}
  syncQuick();render();});
(function buildYearQuick(){
  const ys=MOVIES.map(m=>+m.year).filter(Boolean);if(!ys.length)return;
  const min=Math.min(...ys),max=Math.max(...ys),decs=[];
  for(let d=Math.floor(min/10)*10;d<=max;d+=10)decs.push(d);
  document.getElementById("yearQuick").innerHTML=decs.map(d=>`<button data-dec="${d}">${d}-е</button>`).join("");
})();

const themeBtn=document.getElementById("themeBtn");
themeBtn.addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",cur);
  themeBtn.textContent=cur==="dark"?"🌙":"☀️";localStorage.setItem("movieTheme",cur);});
const savedTheme=localStorage.getItem("movieTheme");
if(savedTheme){document.documentElement.setAttribute("data-theme",savedTheme);
  themeBtn.textContent=savedTheme==="dark"?"🌙":"☀️";}

render();
</script>
